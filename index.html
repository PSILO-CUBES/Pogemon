<link rel="stylesheet" href="css/overworld.css">
<link rel="stylesheet" href="css/battle.css">
<link rel="stylesheet" href="css/evolution.css">
<link rel="stylesheet" href="css/team.css">
<link rel="stylesheet" href="css/bag.css">
<link rel="stylesheet" href="css/stats.css">
<link rel="stylesheet" href="css/pogedex.css">
<link rel="stylesheet" href="css/trainer.css">
<link rel="stylesheet" href="css/boot.css">
<link rel="stylesheet" href="css/pc.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js" integrity="sha512-6+YN/9o9BWrk6wSfGxQGpt3EUK6XeHi6yeHV+TYD2GR0Sj/cggRpXr1BrAQf0as6XslxomMUxXp2vIl+fv0QRA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/app.js" defer type="module"></script>

<div id="content">
  <div id="overlapping"></div>
  
  <canvas></canvas>

  <div id="overworldScene">
    <div id="overworldSceneContainer">
      <div id="overworldMenu"></div>
      <div id="overworldDialogueContainer">
        <div id="openWindow"></div>
        <div id="overworldDialogue"></div>
      </div>
      <div id="optionsMenuContainer">
        <div id="optionsMenu">
          <div id="optionsMenuMusicVolume" class="optionsMenuButtons"><span class="volumeTag">Music Volume : </span><input type="range" id="musicVolume" class="volumeRange"></div>
          <div id="optionsMenuSFXVolume" class="optionsMenuButtons"><span class="volumeTag">SFX Volume : </span><input type="range" id="SFXVolume" class="volumeRange"></div>
          <div id="optionsMenuDelete" class="optionsMenuButtons">DELETE SAVE FILE</div>
        </div>
      </div>
    </div>
  </div>

  <div id="battleScene">
    <div id="scene">
      <div id="sceneInterface">

        <div id="foeHealthBarContainer">
          <div class="infoContainer">
            <div id="foeName" class="battleName"></div>
            <div id="foeStatus" class="status"></div>
            <div id="foeGenderIconContainer" class="genderImgContainer">
              <img id="foeGenderImg" class="genderImg">
            </div>
            <div id="foeLvl" class="battleLvl"></div>
          </div>
          <div class="healthContainer">
            <div id="foeHp" class="hp"></div>
            <div id="foeHealthBarAjustment"class="statusContainer">
              <div class="healthBarContainer">
                <div id="foeHealthBar" class="healthBar"></div>
                <div class="healthBarBackground"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="lvlUpWindow">
          <div id="lvlUpLvl" class="lvlUpDisplay"></div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">Hp : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">Spd : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">Atk : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">Def : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">SpAtk : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
          <div class="lvlUpStatsContainer">
            <div class="lvlUpStatsName lvlUpDisplay">SpDef : </div>
            <div class="lvlUpStats lvlUpDisplay"></div>
          </div>
        </div>
    
        <div id="allyHealthBarContainer">
          <div class="infoContainer">
            <div id="allyName" class="battleName"></div>
            <div id="allyStatus" class="status"></div>
            <div id="allyGenderIconContainer" class="genderImgContainer">
              <img id="allyGenderImg" class="genderImg">
            </div>
            <div id="allyLvl" class="battleLvl"></div>
          </div>
          <div class="healthContainer">
            <div id="allyHp" class="hp"></div>
            <div class="statusContainer">
              <div class="healthBarContainer">
                <div id="allyHealthBar" class="healthBar"></div>
                <div class="healthBarBackground"></div>
              </div>
              <div class="expBarContainer">
                <div id="expBar" class="expBar"></div>
                <div class="expBarBackground"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="menu">
  
      <div id="encounterInterface" class="menuInterface">
        <div id="textBox"></div>
        <div id="optionBox">
        </div>
      </div>
      
      <div id="movesInterface" class="menuInterface">
        <div id="movesBox"></div>
        <div id="movesDesc">
          <div class="movesDescContainer">
            <div class="descContainer">
              <div id="moveDescPow">Pow : --</div>
              <div id="moveDescAcc">Acc : --</div>
              <div id="moveDescPP">PP : --</div>
            </div>
          </div>
          <div class="movesDescContainer">
            <div class="descContainer">
              <div id="moveDescElement">Element : --</div>
              <div id="moveDescType">Type : --</div>
            </div>
          </div>
        </div>
      </div>

      <div id="learnMoveInterface" class="menuInterface">
        <div id="learnMoveDialogue"></div>
        <div id="learnMoveOptionButtonContainer">
        </div>
      </div>
    </div>
  </div>

  <div id="evolutionScene">
    <div></div>
    
    <div id="evolutionInterface">
      <div id="evolutionDialogue"></div>
    </div>

    <div id="evolutionMovesInterface" class="evoMenuInterface">
      <div id="evolutionMovesBox"></div>
      <div id="movesDesc">
        <div class="movesDescContainer">
          <div class="descContainer">
            <div id="moveDescPow">Pow : --</div>
            <div id="moveDescAcc">Acc : --</div>
            <div id="moveDescPP">PP : --</div>
          </div>
        </div>
        <div class="movesDescContainer">
          <div class="descContainer">
            <div id="moveDescElement">Element : --</div>
            <div id="moveDescType">Type : --</div>
          </div>
        </div>
      </div>
    </div>

    <div id="evolutionLearnMovesInterface" class="evoMenuInterface">
      <div id="evolutionLearnMoveDialogue"></div>
      <div id="evolutionLearnMoveOptionButtonContainer">
      </div>
    </div>
  </div>

  <div id="pogedexScene"></div>

  <div id="teamScene"></div>

  <div id="bagScene"></div>

  <div id="statsScene"></div>

  <div id="bootScene"></div>

  <div id="pcScene"></div>

  <div id="trainerScene">
    <div id="trainerCardContainer">
      <div id="trainerCard">
        <div id="trainerCardHeader">
          <div id="trainerCardHeaderContent">
            <hr>
            <span id="trainerCardHeaderText">Trainer Card</span>
            <hr>
          </div>
        </div>
        <div id="trainerCardBody">
          <div id="trainerCardBodyInfoSection">
            <div id="trainerCardBodyInfoNameContainer" class="trainerCardBodyInfoSectionContainer">
              <div id="trainerCardBodyInfoNameContainerLabel" class="trainerCardBodyInfoSectionContainerLabel">Name :</div>
              <div id="trainerCardBodyInfoNameContainerContent" class="trainerCardBodyInfoSectionContainerContent"></div>
            </div>
            <div id="trainerCardBodyInfoMoneyContainer" class="trainerCardBodyInfoSectionContainer">
              <div id="trainerCardBodyInfoMoneyContainerLabel" class="trainerCardBodyInfoSectionContainerLabel">Money :</div>
              <div id="trainerCardBodyInfoMoneyContainerContent" class="trainerCardBodyInfoSectionContainerContent"></div>
            </div>
            <div id="trainerCardBodyInfoPogedexContainer" class="trainerCardBodyInfoSectionContainer">
              <div id="trainerCardBodyInfoPogedexContainerLabel" class="trainerCardBodyInfoSectionContainerLabel">Pogedex :</div>
              <div id="trainerCardBodyInfoPogedexContainerContent" class="trainerCardBodyInfoSectionContainerContent"></div>
            </div>
            <div id="trainerCardBodyInfoTimeContainer" class="trainerCardBodyInfoSectionContainer">
              <div id="trainerCardBodyInfoTimeContainerLabel" class="trainerCardBodyInfoSectionContainerLabel">Time :</div>
              <div id="trainerCardBodyInfoTimeContainerContent" class="trainerCardBodyInfoSectionContainerContent"></div>
            </div>
          </div>
          <div id="trainerCardBodyTrainerSection">
            <img id="trainerCardTrainerImg">
          </div>
        </div>
        <div id="trainerCardFooter"></div>
      </div>
    </div>
  </div>
</div>

<input type="checkbox" style="display: none;" id="scroll-check" checked>
<input type="checkbox" style="display: none;" id="keyboard-check" checked>
