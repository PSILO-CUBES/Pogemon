<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/battle.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js" integrity="sha512-6+YN/9o9BWrk6wSfGxQGpt3EUK6XeHi6yeHV+TYD2GR0Sj/cggRpXr1BrAQf0as6XslxomMUxXp2vIl+fv0QRA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="js/app.js" defer type="module"></script>
<div>
  <div id="overlapping"></div>
  
  <canvas></canvas>

  <div id="battleScene">

    <div id="scene">
      <div id="healthInterface">

        <div id="foeHealthBarContainer">
          <div class="infoContainer">
            <div id="foeName" class="battleName"></div>
            <div id="foeLvl" class="battleLvl"></div>
          </div>
          <div class="healthContainer">
            <div id="foeHp" class="hp"></div>
            <div class="healthBarContainer">
              <div id="foeHealthBar" class="healthBar"></div>
              <div class="healthBarBackground"></div>
            </div>
          </div>
        </div>
    
        <div id="allyHealthBarContainer">
          <div class="infoContainer">
            <div id="allyName" class="battleName"></div>
            <div id="allyLvl" class="battleLvl"></div>
          </div>
          <div class="healthContainer">
            <div id="allyHp" class="hp"></div>
            <div class="healthBarContainer">
              <div id="allyHealthBar" class="healthBar"></div>
              <div class="healthBarBackground"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="menu">
      <!-- <div id="dialogueInterface"></div> -->
  
      <div id="encounterInterface" class="menuInterface">
        <div id="textBox">You sent out Disso!</div>
        <div id="optionBox">
        </div>
      </div>
      
      <div id="movesInterface" class="menuInterface">
        <div id="movesBox">
          <div class="movesButton"></div>
          <div class="movesButton"></div>
          <div class="movesButton"></div>
          <div class="movesButton"></div>
        </div>
        <div id="movesDesc">
          <div class="movesDescContainer">
            <div class="descContainer">
              <div id="moveDescPow">Pow : --</div>
              <div id="moveDescAcc">Acc : --</div>
              <div id="moveDescPP">PP : --</div>
            </div>
          </div>
          <div class="movesDescContainer">
            <div class="descContainer">
              <div id="moveDescElement">Element : --</div>
              <div id="moveDescType">Type : --</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
</div>
